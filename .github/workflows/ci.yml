name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Lint / Test / Build / Audit
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Next.js build requires Node >= 20.9.0 — run CI on supported versions only
        node-version: [20.9.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint --if-present

      - name: Run tests
        run: npm test --if-present

      - name: Build
        run: npm run build --if-present

      - name: Run npm audit (fail on high or critical)
        run: |
          npm audit --audit-level=high || (echo "npm audit detected high/critical vulnerabilities" && exit 1)
